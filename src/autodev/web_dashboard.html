<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>autodev - 项目管理面板</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a31;
      --panel-2: #182344;
      --border: #2a365d;
      --text: #eff4ff;
      --muted: #9fb0d8;
      --running: #2dd4bf;
      --completed: #22c55e;
      --blocked: #f97316;
      --pending: #60a5fa;
      --waiting: #facc15;
      --idle: #94a3b8;
      --warning: #f59e0b;
      --accent: #818cf8;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "IBM Plex Sans", "Segoe UI", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(96,165,250,0.18), transparent 32%),
        radial-gradient(circle at top right, rgba(45,212,191,0.14), transparent 28%),
        linear-gradient(180deg, #08101d 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .page { max-width: 1400px; margin: 0 auto; padding: 24px; }

    /* Header */
    .header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px; flex-wrap: wrap; gap: 16px;
    }
    .header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; }
    .header h1 span { color: var(--accent); }
    .header-actions { display: flex; gap: 12px; align-items: center; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 20px; border-radius: 12px; border: 1px solid var(--border);
      background: var(--panel-2); color: var(--text); cursor: pointer;
      font-size: 14px; font-weight: 600; transition: all 0.2s;
    }
    .btn:hover { background: rgba(129,140,248,0.2); border-color: var(--accent); }
    .btn-primary { background: rgba(129,140,248,0.25); border-color: var(--accent); }
    .btn-primary:hover { background: rgba(129,140,248,0.4); }
    .btn-danger { border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover { background: rgba(239,68,68,0.2); }
    .btn-sm { padding: 6px 14px; font-size: 13px; border-radius: 8px; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Badges */
    .badge {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 4px 10px; border-radius: 999px; font-size: 12px;
      font-weight: 700; letter-spacing: 0.04em; border: 1px solid currentColor;
    }
    .badge-running { color: var(--running); background: rgba(45,212,191,0.12); }
    .badge-completed { color: var(--completed); background: rgba(34,197,94,0.12); }
    .badge-blocked { color: var(--blocked); background: rgba(249,115,22,0.12); }
    .badge-pending { color: var(--pending); background: rgba(96,165,250,0.12); }
    .badge-waiting { color: var(--waiting); background: rgba(250,204,21,0.12); }
    .badge-idle { color: var(--idle); background: rgba(148,163,184,0.14); }
    .badge-planning { color: var(--accent); background: rgba(129,140,248,0.12); }

    /* Cards grid */
    .project-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 16px;
    }
    .project-card {
      background: rgba(18,26,49,0.92); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px; cursor: pointer;
      transition: all 0.2s; position: relative;
    }
    .project-card:hover { border-color: var(--accent); transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(129,140,248,0.15); }
    .card-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px; }
    .card-name { font-size: 18px; font-weight: 700; }
    .card-backend { color: var(--muted); font-size: 12px; margin-top: 4px; }
    .card-task { color: var(--muted); font-size: 13px; margin-top: 8px; }
    .card-task strong { color: var(--text); }

    /* Progress bar */
    .progress-bar { height: 6px; background: var(--panel-2); border-radius: 3px; margin-top: 12px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--completed); border-radius: 3px; transition: width 0.5s; }
    .progress-text { color: var(--muted); font-size: 12px; margin-top: 4px; text-align: right; }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 80px 20px; color: var(--muted);
    }
    .empty-state h2 { font-size: 24px; margin-bottom: 12px; color: var(--text); }
    .empty-state p { margin-bottom: 20px; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      z-index: 1000; align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--panel); border: 1px solid var(--border); border-radius: 20px;
      padding: 28px; width: 520px; max-width: 90vw; max-height: 90vh; overflow-y: auto;
    }
    .modal h2 { font-size: 22px; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: var(--muted); }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text); font-size: 14px; font-family: inherit;
    }
    .form-group textarea { min-height: 120px; resize: vertical; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      outline: none; border-color: var(--accent);
    }
    .form-check { display: flex; align-items: center; gap: 8px; }
    .form-check input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    .form-error { color: var(--danger); font-size: 13px; margin-top: 6px; display: none; }

    /* Detail view */
    .detail-view { display: none; }
    .detail-view.active { display: block; }
    .list-view.hidden { display: none; }
    .back-btn { margin-bottom: 20px; }
    .detail-header {
      background: rgba(18,26,49,0.92); border: 1px solid var(--border);
      border-radius: 18px; padding: 24px; margin-bottom: 20px;
    }
    .detail-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .detail-meta { display: flex; gap: 16px; flex-wrap: wrap; color: var(--muted); font-size: 14px; margin-top: 12px; }
    .detail-stats {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-top: 16px;
    }
    .stat {
      padding: 14px; background: var(--panel-2); border: 1px solid var(--border);
      border-radius: 12px;
    }
    .stat-label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .stat-value { font-size: 24px; font-weight: 700; }

    /* Current task */
    .current-task-panel {
      background: rgba(18,26,49,0.92); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px; margin-bottom: 16px;
    }
    .current-task-panel h3 { font-size: 16px; margin-bottom: 12px; color: var(--muted); }
    .current-task-id { color: var(--running); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; }
    .current-task-title { font-size: 18px; font-weight: 700; margin-top: 4px; }
    .current-task-meta { color: var(--muted); font-size: 13px; margin-top: 8px; }

    /* Task queue */
    .task-queue {
      background: rgba(18,26,49,0.92); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px; margin-bottom: 16px;
    }
    .task-queue h3 { font-size: 16px; margin-bottom: 12px; }
    .task-row {
      padding: 12px; border-radius: 10px; border: 1px solid var(--border);
      background: rgba(24,35,68,0.84); margin-bottom: 8px;
      display: flex; justify-content: space-between; align-items: center; gap: 12px;
    }
    .task-info { display: flex; gap: 10px; align-items: baseline; flex-wrap: wrap; flex: 1; }
    .task-id { color: var(--muted); font-size: 12px; letter-spacing: 0.06em; }
    .task-title { font-size: 14px; font-weight: 600; }

    /* Log viewer */
    .log-panel {
      background: rgba(18,26,49,0.92); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px; margin-bottom: 16px;
    }
    .log-panel h3 { font-size: 16px; margin-bottom: 12px; }
    .log-content {
      background: #080e1a; border-radius: 10px; padding: 14px;
      font-family: "JetBrains Mono", "Fira Code", monospace; font-size: 12px;
      line-height: 1.6; max-height: 400px; overflow-y: auto; white-space: pre-wrap;
      word-break: break-all; color: var(--muted);
    }

    /* Detail layout */
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 900px) {
      .detail-grid, .detail-stats, .project-grid { grid-template-columns: 1fr; }
    }

    /* Notifications */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 2000;
      background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
      padding: 14px 20px; font-size: 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      transition: all 0.3s; opacity: 0; transform: translateY(10px);
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { border-color: var(--danger); }
    .toast.success { border-color: var(--completed); }

    /* Spinner */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .detail-actions { display: flex; gap: 10px; margin-top: 16px; }
  </style>
</head>
<body>
<div class="page">
  <!-- Header -->
  <div class="header">
    <h1><span>autodev</span> 项目管理面板</h1>
    <div class="header-actions">
      <span id="session-count" style="color:var(--muted);font-size:14px;"></span>
      <button class="btn btn-primary" onclick="openNewProjectModal()">+ 新建项目</button>
    </div>
  </div>

  <!-- List View -->
  <div id="list-view" class="list-view">
    <div id="project-grid" class="project-grid"></div>
    <div id="empty-state" class="empty-state" style="display:none;">
      <h2>还没有项目</h2>
      <p>点击"新建项目"开始创建你的第一个 autodev 项目</p>
      <button class="btn btn-primary" onclick="openNewProjectModal()">+ 新建项目</button>
    </div>
  </div>

  <!-- Detail View -->
  <div id="detail-view" class="detail-view">
    <button class="btn btn-sm back-btn" onclick="showListView()">← 返回项目列表</button>
    <div id="detail-content"></div>
  </div>
</div>

<!-- New Project Modal -->
<div id="new-project-modal" class="modal-overlay" onclick="closeModalOnOverlay(event)">
  <div class="modal">
    <h2>新建项目</h2>
    <div class="form-group">
      <label>项目目录</label>
      <input type="text" id="project-directory" placeholder="例如: /home/user/projects/my-todo-app" autocomplete="off">
      <div class="form-error" id="dir-error"></div>
    </div>
    <div class="form-group">
      <label>开发说明 / 项目需求</label>
      <textarea id="project-intent" placeholder="描述你想要构建的项目，例如：&#10;构建一个基于 FastAPI 的待办事项服务，使用 SQLite 存储，提供 CRUD 接口，包含单元测试。"></textarea>
      <div class="form-error" id="intent-error"></div>
    </div>
    <div class="form-group">
      <label>AI 后端</label>
      <select id="project-backend">
        <option value="codex">Codex</option>
        <option value="claude">Claude</option>
        <option value="gemini">Gemini</option>
        <option value="opencode">OpenCode</option>
      </select>
    </div>
    <div class="form-group">
      <div class="form-check">
        <input type="checkbox" id="project-autostart" checked>
        <label for="project-autostart" style="margin:0">创建后自动开始执行</label>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeNewProjectModal()">取消</button>
      <button class="btn btn-primary" id="create-btn" onclick="createProject()">创建项目</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
const API = '';
let currentProject = null;
let refreshTimer = null;

// ==================== API Calls ====================

async function apiGet(path) {
  const resp = await fetch(API + path);
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({detail: resp.statusText}));
    throw new Error(err.detail || resp.statusText);
  }
  return resp.json();
}

async function apiPost(path, body) {
  const resp = await fetch(API + path, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({detail: resp.statusText}));
    throw new Error(err.detail || resp.statusText);
  }
  return resp.json();
}

// ==================== List View ====================

async function loadProjects() {
  try {
    const data = await apiGet('/api/projects');
    renderProjectGrid(data.projects);
    document.getElementById('session-count').textContent =
      `${data.active_sessions} 个活跃会话`;
  } catch (e) {
    console.error('Failed to load projects:', e);
  }
}

function renderProjectGrid(projects) {
  const grid = document.getElementById('project-grid');
  const empty = document.getElementById('empty-state');

  if (!projects || projects.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = projects.map(p => {
    const status = p.session_alive ? 'running' : (p.status || 'idle');
    const statusLabel = statusLabels[status] || status;
    const badgeClass = badgeClasses[status] || 'badge-idle';
    const total = p.counts?.total || 0;
    const completed = p.counts?.completed || 0;
    const pct = total > 0 ? Math.round(completed / total * 100) : 0;
    const currentTask = p.current_task ? `<div class="card-task">当前: <strong>${esc(p.current_task)}</strong></div>` : '';

    return `
      <div class="project-card" onclick="showDetailView('${esc(p.name)}')">
        <div class="card-header">
          <div>
            <div class="card-name">${esc(p.name)}</div>
            <div class="card-backend">路径: ${esc(p.path || '')}　|　后端: ${esc(p.backend || 'codex')}</div>
          </div>
          <span class="badge ${badgeClass}">${statusLabel}</span>
        </div>
        ${currentTask}
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="progress-text">${completed}/${total} 任务完成 (${pct}%)</div>
      </div>
    `;
  }).join('');
}

const statusLabels = {
  idle: '空闲', starting: '启动中', running: '运行中', validating: '验证中',
  completed: '已完成', blocked: '已阻塞', pending: '等待中',
  planning: '规划中', waiting: '等待中',
};
const badgeClasses = {
  idle: 'badge-idle', starting: 'badge-running', running: 'badge-running',
  validating: 'badge-running', completed: 'badge-completed', blocked: 'badge-blocked',
  pending: 'badge-pending', planning: 'badge-planning', waiting: 'badge-waiting',
};

// ==================== Detail View ====================

async function showDetailView(name) {
  currentProject = name;
  document.getElementById('list-view').classList.add('hidden');
  document.getElementById('detail-view').classList.add('active');
  await loadProjectDetail(name);
  startDetailRefresh();
}

function showListView() {
  currentProject = null;
  document.getElementById('detail-view').classList.remove('active');
  document.getElementById('list-view').classList.remove('hidden');
  stopDetailRefresh();
  loadProjects();
}

function startDetailRefresh() {
  stopDetailRefresh();
  refreshTimer = setInterval(() => {
    if (currentProject) loadProjectDetail(currentProject);
  }, 3000);
}

function stopDetailRefresh() {
  if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
}

async function loadProjectDetail(name) {
  try {
    const [status, tasks, logData] = await Promise.all([
      apiGet(`/api/projects/${encodeURIComponent(name)}/status`),
      apiGet(`/api/projects/${encodeURIComponent(name)}/tasks`).catch(() => ({tasks: []})),
      apiGet(`/api/projects/${encodeURIComponent(name)}/log`).catch(() => ({lines: []})),
    ]);
    renderDetailView(name, status, tasks, logData);
  } catch (e) {
    console.error('Failed to load detail:', e);
    showToast('加载项目详情失败: ' + e.message, 'error');
  }
}

function renderDetailView(name, status, tasks, logData) {
  const run = status.run || {};
  const counts = status.counts || {};
  const runStatus = status.session_alive ? (run.status || 'running') : (run.status || 'idle');
  const statusLabel = statusLabels[runStatus] || runStatus;
  const badgeClass = badgeClasses[runStatus] || 'badge-idle';
  const total = counts.total || 0;
  const completed = counts.completed || 0;
  const pct = total > 0 ? Math.round(completed / total * 100) : 0;

  const taskRows = (tasks.tasks || []).map(t => {
    const ts = t.status || 'pending';
    const tLabel = statusLabels[ts] || ts;
    const tBadge = badgeClasses[ts] || 'badge-pending';
    return `
      <div class="task-row">
        <div class="task-info">
          <span class="task-id">${esc(t.id || '')}</span>
          <span class="task-title">${esc(t.title || t.name || '')}</span>
        </div>
        <span class="badge ${tBadge}">${tLabel}</span>
      </div>
    `;
  }).join('') || '<div style="color:var(--muted);padding:12px;">暂无任务</div>';

  const logLines = (logData.lines || []).join('\n') || '暂无日志';

  const canStart = !status.session_alive;
  const canStop = status.session_alive;

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-header">
      <div style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap;gap:12px;">
        <div>
          <div class="detail-title">${esc(name)}</div>
          <div class="detail-meta">
            <span>后端: ${esc(status.backend || 'codex')}</span>
            <span>轮次: ${run.current_epoch || 1}/${run.max_epochs || 1}</span>
            <span>更新: ${esc(run.updated_at || '-')}</span>
          </div>
        </div>
        <span class="badge ${badgeClass}">${statusLabel}</span>
      </div>
      <div class="detail-stats">
        <div class="stat"><div class="stat-label">总计</div><div class="stat-value">${total}</div></div>
        <div class="stat"><div class="stat-label">运行中</div><div class="stat-value">${counts.running || 0}</div></div>
        <div class="stat"><div class="stat-label">已完成</div><div class="stat-value">${completed}</div></div>
        <div class="stat"><div class="stat-label">已阻塞</div><div class="stat-value">${counts.blocked || 0}</div></div>
        <div class="stat"><div class="stat-label">进度</div><div class="stat-value">${pct}%</div></div>
      </div>
      <div class="detail-actions">
        <button class="btn btn-primary btn-sm" onclick="startProject('${esc(name)}')" ${canStart ? '' : 'disabled'}>
          ▶ 启动
        </button>
        <button class="btn btn-danger btn-sm" onclick="stopProject('${esc(name)}')" ${canStop ? '' : 'disabled'}>
          ■ 停止
        </button>
      </div>
    </div>

    <div class="detail-grid">
      <div>
        <div class="current-task-panel">
          <h3>当前任务</h3>
          ${run.current_task_id ? `
            <div class="current-task-id">${esc(run.current_task_id)}</div>
            <div class="current-task-title">${esc(run.current_task_title || '')}</div>
            <div class="current-task-meta">
              尝试 ${run.current_attempt || 0}/${run.max_attempts || 0} ·
              耗时 ${run.heartbeat_elapsed_seconds || 0}秒
            </div>
          ` : '<div style="color:var(--muted);">当前没有正在执行的任务</div>'}
        </div>
        <div class="task-queue">
          <h3>任务队列</h3>
          ${taskRows}
        </div>
      </div>
      <div>
        <div class="log-panel">
          <h3>运行日志</h3>
          <div class="log-content" id="log-content">${esc(logLines)}</div>
        </div>
      </div>
    </div>
  `;

  // Auto-scroll log
  const logEl = document.getElementById('log-content');
  if (logEl) logEl.scrollTop = logEl.scrollHeight;
}

// ==================== Actions ====================

async function startProject(name) {
  try {
    await apiPost(`/api/projects/${encodeURIComponent(name)}/start`, {});
    showToast(`项目 ${name} 已启动`, 'success');
    setTimeout(() => loadProjectDetail(name), 1000);
  } catch (e) {
    showToast('启动失败: ' + e.message, 'error');
  }
}

async function stopProject(name) {
  try {
    await apiPost(`/api/projects/${encodeURIComponent(name)}/stop`, {});
    showToast(`项目 ${name} 已停止`, 'success');
    setTimeout(() => loadProjectDetail(name), 1000);
  } catch (e) {
    showToast('停止失败: ' + e.message, 'error');
  }
}

// ==================== New Project Modal ====================

function openNewProjectModal() {
  document.getElementById('new-project-modal').classList.add('active');
  document.getElementById('project-directory').focus();
}

function closeNewProjectModal() {
  document.getElementById('new-project-modal').classList.remove('active');
  document.getElementById('project-directory').value = '';
  document.getElementById('project-intent').value = '';
  document.getElementById('dir-error').style.display = 'none';
  document.getElementById('intent-error').style.display = 'none';
}

function closeModalOnOverlay(e) {
  if (e.target === e.currentTarget) closeNewProjectModal();
}

async function createProject() {
  const directory = document.getElementById('project-directory').value.trim();
  const intent = document.getElementById('project-intent').value.trim();
  const backend = document.getElementById('project-backend').value;
  const autostart = document.getElementById('project-autostart').checked;

  // Validate
  let valid = true;
  if (!directory) {
    document.getElementById('dir-error').textContent = '请输入项目目录路径';
    document.getElementById('dir-error').style.display = 'block';
    valid = false;
  } else {
    document.getElementById('dir-error').style.display = 'none';
  }
  if (!intent) {
    document.getElementById('intent-error').textContent = '请输入开发说明';
    document.getElementById('intent-error').style.display = 'block';
    valid = false;
  } else {
    document.getElementById('intent-error').style.display = 'none';
  }
  if (!valid) return;

  const btn = document.getElementById('create-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 创建中...';

  try {
    const result = await apiPost('/api/projects', { directory, intent, backend, auto_start: autostart });
    showToast(`项目 ${result.name} 创建成功!`, 'success');
    closeNewProjectModal();
    loadProjects();
  } catch (e) {
    showToast('创建失败: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '创建项目';
  }
}

// ==================== Utilities ====================

function esc(s) {
  if (!s) return '';
  const div = document.createElement('div');
  div.textContent = String(s);
  return div.innerHTML;
}

function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = `toast ${type || ''} show`;
  setTimeout(() => { toast.className = 'toast'; }, 4000);
}

// ==================== Init ====================

loadProjects();
setInterval(() => {
  if (!currentProject) loadProjects();
}, 3000);
</script>
</body>
</html>
